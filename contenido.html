<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PatitasBA — Generador de Contenido para Instagram</title>
<meta name="robots" content="noindex, nofollow">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Lora:wght@400;500;600;700&display=swap');

  :root {
    --cream: #FFF8F0;
    --warm-bg: #FEF6EE;
    --brown: #8B6F47;
    --brown-dark: #6B5335;
    --brown-light: #A8896C;
    --rose: #D4827E;
    --rose-soft: #E8A5A2;
    --rose-bg: #FDF0EF;
    --sand: #E8DDD3;
    --text: #4A3728;
    --text-light: #8B7B6B;
    --text-muted: #B8A898;
    --card-bg: #FFFCF8;
    --border: #E8DDD3;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--warm-bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ─── NAV ─── */
  .topbar {
    background: var(--cream);
    border-bottom: 1px solid var(--sand);
    padding: 12px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .topbar .logo { font-size: 1.1rem; font-weight: 700; color: var(--brown-dark); font-family: 'Lora', serif; }
  .topbar .logo span { color: var(--rose); }
  .topbar .back-link { color: var(--text-light); text-decoration: none; font-size: 0.85rem; }
  .topbar .back-link:hover { color: var(--brown-dark); }

  /* ─── LAYOUT ─── */
  .container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 24px;
  }

  .header {
    text-align: center;
    margin-bottom: 32px;
  }
  .header h1 {
    font-size: 1.8rem;
    font-weight: 700;
    font-family: 'Lora', serif;
    color: var(--brown-dark);
    margin-bottom: 8px;
  }
  .header p { color: var(--text-light); font-size: 0.95rem; }

  /* ─── SUGERENCIA DEL DÍA ─── */
  .daily-pick {
    background: var(--rose-bg);
    border: 1px solid var(--rose-soft);
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 32px;
    display: flex;
    align-items: center;
    gap: 20px;
  }
  .daily-pick .badge {
    background: var(--rose);
    color: #fff;
    font-weight: 700;
    font-size: 0.75rem;
    padding: 6px 14px;
    border-radius: 20px;
    white-space: nowrap;
    letter-spacing: 0.5px;
  }
  .daily-pick .info { flex: 1; }
  .daily-pick .info h3 { color: var(--brown-dark); font-size: 1.1rem; margin-bottom: 4px; font-family: 'Lora', serif; }
  .daily-pick .info p { color: var(--text-light); font-size: 0.85rem; }
  .daily-pick .action-btn {
    background: var(--brown);
    color: #fff;
    border: none;
    padding: 10px 20px;
    border-radius: 10px;
    font-weight: 600;
    cursor: pointer;
    font-size: 0.9rem;
    white-space: nowrap;
  }
  .daily-pick .action-btn:hover { background: var(--brown-dark); }

  /* ─── STATS ─── */
  .stats-row {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }
  .stat-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 20px;
    flex: 1;
    min-width: 140px;
    text-align: center;
  }
  .stat-card .num { font-size: 1.6rem; font-weight: 800; color: var(--brown-dark); font-family: 'Lora', serif; }
  .stat-card .label { font-size: 0.75rem; color: var(--text-light); margin-top: 2px; }

  /* ─── FORMAT TABS ─── */
  .format-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }
  .format-tab {
    background: var(--card-bg);
    border: 1px solid var(--border);
    color: var(--text-light);
    padding: 8px 18px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.85rem;
    font-weight: 500;
    transition: all 0.2s;
  }
  .format-tab:hover { border-color: var(--brown-light); color: var(--brown-dark); }
  .format-tab.active {
    background: var(--brown);
    border-color: var(--brown);
    color: #fff;
  }

  /* ─── GRID DE CARDS ─── */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 24px;
  }

  .pet-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .pet-card:hover { border-color: var(--brown-light); box-shadow: 0 4px 20px rgba(139,111,71,0.1); }
  .pet-card.suggested { border-color: var(--rose); box-shadow: 0 4px 20px rgba(212,130,126,0.15); }

  .pet-card .preview {
    position: relative;
    width: 100%;
    aspect-ratio: 1;
    overflow: hidden;
    background: var(--sand);
  }
  .pet-card .preview canvas {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .pet-card .card-body { padding: 16px; }
  .pet-card .card-body h3 { font-size: 1rem; font-weight: 700; color: var(--brown-dark); margin-bottom: 4px; font-family: 'Lora', serif; }
  .pet-card .meta { font-size: 0.8rem; color: var(--text-light); margin-bottom: 12px; }
  .pet-card .meta span { margin-right: 8px; }

  .pet-card .caption-box {
    background: var(--warm-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    margin-bottom: 12px;
    max-height: 120px;
    overflow-y: auto;
    font-size: 0.8rem;
    color: var(--text);
    line-height: 1.5;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .card-actions {
    display: flex;
    gap: 8px;
  }
  .card-actions button {
    flex: 1;
    padding: 10px;
    border-radius: 8px;
    border: none;
    font-weight: 600;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-download {
    background: var(--brown);
    color: #fff;
  }
  .btn-download:hover { background: var(--brown-dark); }
  .btn-copy {
    background: var(--sand);
    color: var(--text);
  }
  .btn-copy:hover { background: var(--brown-light); color: #fff; }
  .btn-copy.copied { background: #7a9e7a; color: #fff; }

  /* ─── LOADING ─── */
  .loading {
    text-align: center;
    padding: 60px;
    color: var(--text-light);
  }
  .loading .spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--sand);
    border-top-color: var(--rose);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ─── RESPONSIVE ─── */
  @media (max-width: 768px) {
    .daily-pick { flex-direction: column; text-align: center; }
    .cards-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">🐾 Patitas<span>BA</span> — Content Studio</div>
  <a href="/" class="back-link">← Volver al sitio</a>
</div>

<div class="container">
  <div class="header">
    <h1>Generador de Contenido para Instagram</h1>
    <p>Cards y captions con corazón, listos para postear. Sugerencia del día incluida.</p>
  </div>

  <div id="daily-pick-container"></div>

  <div id="stats-container" class="stats-row"></div>

  <div class="format-tabs" id="format-tabs">
    <button class="format-tab active" data-format="feed">📱 Feed (1080×1080)</button>
    <button class="format-tab" data-format="story">📲 Story (1080×1920)</button>
    <button class="format-tab" data-format="nadie-me-quiere">💔 "Nadie me quiere"</button>
    <button class="format-tab" data-format="antes-despues">🔄 Antes y después</button>
  </div>

  <div id="cards-container" class="cards-grid">
    <div class="loading">
      <div class="spinner"></div>
      <p>Cargando mascotas...</p>
    </div>
  </div>
</div>

<!-- ─── CANVAS OFFSCREEN (para generar imágenes) ─── -->
<canvas id="offscreen-canvas" style="display:none;"></canvas>

<script>
// ═══════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════
const PETS_JSON_URL = 'pets.json';
let allPets = [];
let currentFormat = 'feed';

// ═══════════════════════════════════════
//  CAPTIONS — TONO CÁLIDO Y HUMANO
//  (inspirado en @zaguatesrefugio)
// ═══════════════════════════════════════

// Hooks que cuentan una historia, no venden
const HOOKS_ADOPCION = [
  (p) => `Hablemos de ${p.nombre} ❤️\n${p.genero === '♀' ? 'Es una ' : 'Es un '}${p.tipo === 'perro' ? 'perrito' : 'gatito'} que está buscando su familia para siempre. Tiene ${p.edad} y cada día nos demuestra lo increíble que es.`,
  (p) => `${p.nombre} tiene algo especial 🧡\nDe esas miradas que te llegan al corazón. Tiene ${p.edad}, es ${p.tamanio.toLowerCase()} y está esperando a alguien que ${p.genero === '♀' ? 'la' : 'lo'} elija.`,
  (p) => `Les queremos presentar a ${p.nombre} 🐾\nLlegó al refugio buscando una segunda oportunidad y la verdad es que se la merece con creces. Tiene ${p.edad} y es ${p.tamanio.toLowerCase()}.`,
  (p) => `Conocé a ${p.nombre} 💛\n${p.genero === '♀' ? 'Una ' : 'Un '}${p.tipo === 'perro' ? (p.raza !== 'Mestizo/a' ? p.raza.toLowerCase() : 'perrito mestizo') : (p.raza !== 'Doméstico/a' ? p.raza.toLowerCase() : 'gatito doméstico')} de ${p.edad} que solo necesita una familia que ${p.genero === '♀' ? 'la' : 'lo'} quiera como merece.`,
  (p) => `${p.nombre} está esperando 💔\nA veces cuesta encontrar familia, pero no perdemos la esperanza. Tiene ${p.edad}, es ${p.tamanio.toLowerCase()}, y tiene mucho amor para dar.`,
  (p) => `Cada vez que miramos a ${p.nombre} nos damos cuenta de por qué hacemos esto 🧡\nTiene ${p.edad}, es ${p.tamanio.toLowerCase()} y está ${p.genero === '♀' ? 'lista' : 'listo'} para ser parte de una familia.`,
  (p) => `${p.nombre} necesita que su historia llegue a más personas ❤️‍🩹\n${p.genero === '♀' ? 'Es una ' : 'Es un '}${p.tipo === 'perro' ? 'perrito' : 'gatito'} ${p.tamanio.toLowerCase()} de ${p.edad} que todavía no encontró a su humano. Capaz sos vos, o capaz conocés a alguien.`,
  (p) => `Les presentamos a ${p.nombre} 🐾\nTiene ${p.edad} y es de esos ${p.tipo === 'perro' ? 'perritos' : 'gatitos'} que cuando los conocés te cambian el día. Solo ${p.genero === '♀' ? 'le' : 'le'} falta una familia que ${p.genero === '♀' ? 'la' : 'lo'} acompañe para siempre.`,
];

// Formato "Nadie me quiere" — primera persona, vulnerable pero esperanzado
const HOOKS_NADIE = [
  (p, dias) => `Hace ${dias} días que estoy acá. Mis voluntarios me cuidan, me dan de comer, me hacen mimos… pero todavía no tengo una familia propia 💔\nMe llamo ${p.nombre} y sigo esperando.`,
  (p, dias) => `A veces me pregunto cuándo va a ser mi turno 🥺\nVeo cómo mis compañeros se van con sus familias nuevas y yo me quedo. No es que no sea ${p.genero === '♀' ? 'buena' : 'bueno'}… solo que todavía no me encontraron.\nSoy ${p.nombre} y llevo ${dias} días esperando.`,
  (p, dias) => `Me llamo ${p.nombre} y llevo ${dias} días soñando con un hogar ❤️‍🩹\nTengo ${p.edad}, soy ${p.tamanio.toLowerCase()} y prometo que tengo mucho amor para dar. Solo necesito que alguien me dé la oportunidad.`,
  (p, dias) => `${dias} días pueden parecer poco… pero cuando estás esperando una familia, cada uno se siente eterno 💔\nSoy ${p.nombre}. Tengo ${p.edad}. Y sigo creyendo que mi persona va a llegar.`,
  (p, dias) => `Hoy me desperté y pensé: "capaz hoy es el día" 🐾\nPienso eso todas las mañanas desde hace ${dias} días. Me llamo ${p.nombre} y todavía estoy acá, esperando con el corazón lleno de esperanza.`,
];

const HASHTAGS = '#PatitasBA #AdoptáConAmor #AdopciónResponsable #AdoptáNoCompres #PerrosEnAdopción #GatosEnAdopción #BuenosAires #CABA #GBA #Refugio #Rescate';

const CTA_OPTIONS = [
  '🐾 Conocé su historia completa en patitasba.com.ar',
  '💛 Más info y fotos en patitasba.com.ar',
  '📲 Entrá a patitasba.com.ar y conocé a todos los que esperan un hogar',
  '🐾 patitasba.com.ar — Donde las historias de amor empiezan',
];

function generateCaption(pet, format) {
  const diasEnEspera = Math.max(1, Math.floor((Date.now() - new Date(pet.fecha).getTime()) / 86400000));
  let hook;

  if (format === 'nadie-me-quiere') {
    hook = HOOKS_NADIE[Math.floor(Math.random() * HOOKS_NADIE.length)](pet, diasEnEspera);
  } else {
    hook = HOOKS_ADOPCION[Math.floor(Math.random() * HOOKS_ADOPCION.length)](pet);
  }

  const cta = CTA_OPTIONS[Math.floor(Math.random() * CTA_OPTIONS.length)];
  const orgLine = `🏥 Refugio: @${pet.ig}`;

  return `${hook}\n\n` +
    `${pet.emoji} ${pet.nombre}\n` +
    `📅 ${pet.edad} · 📏 ${pet.tamanio} · ${pet.raza}\n` +
    `🏠 ${pet.org} (@${pet.ig})\n\n` +
    `Si creés que ${pet.nombre} puede ser parte de tu familia, o conocés a alguien que esté buscando un compañero, escribile al refugio 💌\n\n` +
    `${cta}\n\n` +
    `Si no podés adoptar, compartir también ayuda 🧡\n\n` +
    HASHTAGS;
}

// ═══════════════════════════════════════
//  PRIORIDAD: A QUIÉN POSTEAR HOY
// ═══════════════════════════════════════
function scorePet(pet) {
  const dias = Math.floor((Date.now() - new Date(pet.fecha).getTime()) / 86400000);
  let score = dias * 10; // más días esperando = más prioridad
  if (pet.edadCat === 'adulto' || pet.edadCat === 'adulto+') score += 30; // adultos tienen menos chances
  if (pet.raza === 'Mestizo/a' || pet.raza === 'Doméstico/a') score += 20; // mestizos cuestan más
  if (pet.tamanio === 'Grande') score += 15; // grandes cuestan más
  return score;
}

function getDailyPick(pets) {
  const available = pets.filter(p => p.disponible);
  if (!available.length) return null;
  // Usar el día como seed para que sea consistente durante el día
  const today = new Date().toISOString().split('T')[0];
  const sorted = [...available].sort((a, b) => scorePet(b) - scorePet(a));
  // Top 3 por prioridad, rotar por día
  const dayNum = parseInt(today.replace(/-/g, ''));
  return sorted[dayNum % Math.min(3, sorted.length)];
}

// ═══════════════════════════════════════
//  CANVAS: GENERAR CARDS
// ═══════════════════════════════════════
async function loadImage(src) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => resolve(img);
    img.onerror = () => reject(new Error('No se pudo cargar: ' + src));
    img.src = src;
  });
}

function drawRoundedRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

async function generateFeedCard(canvas, pet) {
  const W = 1080, H = 1080;
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');

  // Warm cream background
  ctx.fillStyle = '#FFF8F0';
  ctx.fillRect(0, 0, W, H);

  // Try to load pet image
  let img;
  const imgH = 650;
  const margin = 40;
  try {
    img = await loadImage(pet.imgUrls[0]);
    const scale = Math.max((W - margin*2) / img.width, imgH / img.height);
    const dx = margin + ((W - margin*2) - img.width * scale) / 2;
    const dy = margin + (imgH - img.height * scale) / 2;
    ctx.save();
    drawRoundedRect(ctx, margin, margin, W - margin*2, imgH, 24);
    ctx.clip();
    ctx.drawImage(img, dx, dy, img.width * scale, img.height * scale);
    ctx.restore();
  } catch (e) {
    // No image - warm gradient
    drawRoundedRect(ctx, margin, margin, W - margin*2, imgH, 24);
    const grad = ctx.createLinearGradient(0, 0, W, imgH);
    grad.addColorStop(0, '#E8DDD3');
    grad.addColorStop(1, '#D4827E');
    ctx.fillStyle = grad;
    ctx.fill();
  }

  // "Busca familia" badge on photo
  const badgeY = 60;
  ctx.font = '600 26px Inter, sans-serif';
  const badgeText = pet.disponible ? '❤️ Busca familia' : '🏠 Ya encontró hogar';
  const badgeW = ctx.measureText(badgeText).width + 36;
  drawRoundedRect(ctx, 60, badgeY, badgeW, 46, 23);
  ctx.fillStyle = pet.disponible ? 'rgba(212,130,126,0.9)' : 'rgba(122,158,122,0.9)';
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.fillText(badgeText, 78, badgeY + 32);

  // Shelter tag on photo
  ctx.font = '500 22px Inter, sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  const igTag = `@${pet.ig}`;
  const igW = ctx.measureText(igTag).width + 28;
  drawRoundedRect(ctx, 60, badgeY + 56, igW, 36, 18);
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = '500 20px Inter, sans-serif';
  ctx.fillText(igTag, 74, badgeY + 80);

  // Pet name
  const nameY = imgH + margin + 70;
  ctx.font = '700 64px Lora, serif';
  ctx.fillStyle = '#4A3728';
  ctx.fillText(pet.nombre, margin + 10, nameY);

  // Info line
  ctx.font = '500 28px Inter, sans-serif';
  ctx.fillStyle = '#8B7B6B';
  const infoText = `${pet.emoji} ${pet.tipo === 'perro' ? 'Perro' : 'Gato'} · ${pet.edad} · ${pet.tamanio} · ${pet.raza}`;
  ctx.fillText(infoText, margin + 10, nameY + 42);

  // Description (truncated)
  const desc = pet.desc.length > 120 ? pet.desc.substring(0, 117) + '...' : pet.desc;
  ctx.font = '400 24px Inter, sans-serif';
  ctx.fillStyle = '#8B7B6B';
  wrapText(ctx, desc, margin + 10, nameY + 90, W - margin*2 - 20, 32);

  // Bottom bar - warm
  ctx.fillStyle = '#F0E6DA';
  ctx.fillRect(0, H - 70, W, 70);
  ctx.font = '600 24px Lora, serif';
  ctx.fillStyle = '#8B6F47';
  ctx.fillText('🐾 patitasba.com.ar', margin, H - 28);

  // Shelter on right
  ctx.font = '500 22px Inter, sans-serif';
  ctx.fillStyle = '#A8896C';
  const orgText = `📍 ${pet.org}`;
  const orgW = ctx.measureText(orgText).width;
  ctx.fillText(orgText, W - orgW - 40, H - 30);
}

async function generateStoryCard(canvas, pet) {
  const W = 1080, H = 1920;
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');

  // Background
  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(0, 0, W, H);

  // Try to load pet image - full bleed
  try {
    const img = await loadImage(pet.imgUrls[0]);
    const scale = Math.max(W / img.width, H / img.height);
    const dx = (W - img.width * scale) / 2;
    const dy = (H - img.height * scale) / 2;
    ctx.drawImage(img, dx, dy, img.width * scale, img.height * scale);

    // Dark overlay
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.fillRect(0, 0, W, H);
  } catch (e) {
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, '#E8DDD3');
    grad.addColorStop(1, '#D4827E');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);
  }

  // Warm bottom gradient (cream/brown instead of black)
  const grad = ctx.createLinearGradient(0, H - 800, 0, H);
  grad.addColorStop(0, 'rgba(74,55,40,0)');
  grad.addColorStop(0.5, 'rgba(74,55,40,0.7)');
  grad.addColorStop(1, 'rgba(74,55,40,0.92)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, H - 800, W, 800);

  // Top badge
  ctx.font = '600 30px Inter, sans-serif';
  const badgeText = '❤️ Busca familia';
  const badgeW = ctx.measureText(badgeText).width + 48;
  drawRoundedRect(ctx, (W - badgeW) / 2, 80, badgeW, 56, 28);
  ctx.fillStyle = 'rgba(212,130,126,0.9)';
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'center';
  ctx.fillText(badgeText, W / 2, 117);

  // Name
  ctx.font = '700 90px Lora, serif';
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'center';
  ctx.fillText(pet.nombre, W / 2, H - 480);

  // Info
  ctx.font = '500 36px Inter, sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  ctx.fillText(`${pet.emoji} ${pet.edad} · ${pet.tamanio} · ${pet.raza}`, W / 2, H - 415);

  // Description
  ctx.font = '400 30px Inter, sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.textAlign = 'center';
  const desc = pet.desc.length > 120 ? pet.desc.substring(0, 117) + '...' : pet.desc;
  wrapText(ctx, desc, W / 2, H - 340, W - 120, 40, 'center');

  // CTA
  drawRoundedRect(ctx, 140, H - 220, W - 280, 70, 35);
  ctx.fillStyle = '#8B6F47';
  ctx.fill();
  ctx.font = '600 30px Inter, sans-serif';
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'center';
  ctx.fillText('🐾 Conocé su historia', W / 2, H - 177);

  // Footer
  ctx.font = '500 26px Inter, sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.fillText(`patitasba.com.ar · @${pet.ig}`, W / 2, H - 100);

  ctx.textAlign = 'left';
}

async function generateNadieMeQuiereCard(canvas, pet) {
  const W = 1080, H = 1080;
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');

  // Warm muted background
  ctx.fillStyle = '#3D2E22';
  ctx.fillRect(0, 0, W, H);

  // Try image - softly desaturated with warm tone
  try {
    const img = await loadImage(pet.imgUrls[0]);
    const scale = Math.max(W / img.width, H / img.height);
    const dx = (W - img.width * scale) / 2;
    const dy = (H - img.height * scale) / 2;
    ctx.filter = 'grayscale(30%) brightness(0.5) sepia(20%)';
    ctx.drawImage(img, dx, dy, img.width * scale, img.height * scale);
    ctx.filter = 'none';
  } catch (e) {}

  // Warm overlay
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, 'rgba(61,46,34,0.4)');
  grad.addColorStop(0.6, 'rgba(61,46,34,0.7)');
  grad.addColorStop(1, 'rgba(61,46,34,0.92)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Days counter
  const dias = Math.max(1, Math.floor((Date.now() - new Date(pet.fecha).getTime()) / 86400000));
  ctx.textAlign = 'center';
  ctx.font = '700 160px Lora, serif';
  ctx.fillStyle = '#D4827E';
  ctx.fillText(dias, W / 2, 280);
  ctx.font = '500 34px Inter, sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.fillText('días esperando una familia', W / 2, 330);

  // Name
  ctx.font = '700 72px Lora, serif';
  ctx.fillStyle = '#fff';
  ctx.fillText(pet.nombre, W / 2, 540);

  // Emotional quote
  ctx.font = '400 30px Inter, sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  const quotes = [
    '"Capaz hoy es el día"',
    '"Sigo esperando con el corazón lleno"',
    '"Solo necesito una oportunidad"',
    '"¿Cuándo me toca a mí?"',
  ];
  const quote = quotes[Math.floor(Math.random() * quotes.length)];
  ctx.fillText(quote, W / 2, 620);

  // Info
  ctx.font = '500 28px Inter, sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.fillText(`${pet.emoji} ${pet.tipo === 'perro' ? 'Perro' : 'Gato'} · ${pet.edad} · ${pet.tamanio} · ${pet.raza}`, W / 2, 700);

  // CTA bottom
  ctx.font = '600 32px Inter, sans-serif';
  ctx.fillStyle = '#D4827E';
  ctx.fillText('Conocé su historia en patitasba.com.ar 🐾', W / 2, 850);

  // Footer
  ctx.font = '500 24px Inter, sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.fillText(`🐾 patitasba.com.ar · @${pet.ig}`, W / 2, H - 50);

  ctx.textAlign = 'left';
}

function wrapText(ctx, text, x, y, maxWidth, lineHeight, align) {
  const words = text.split(' ');
  let line = '';
  const savedAlign = ctx.textAlign;
  if (align) ctx.textAlign = align;

  for (let n = 0; n < words.length; n++) {
    const testLine = line + words[n] + ' ';
    const metrics = ctx.measureText(testLine);
    if (metrics.width > maxWidth && n > 0) {
      ctx.fillText(line.trim(), x, y);
      line = words[n] + ' ';
      y += lineHeight;
    } else {
      line = testLine;
    }
  }
  ctx.fillText(line.trim(), x, y);
  if (align) ctx.textAlign = savedAlign;
}

// ═══════════════════════════════════════
//  DOWNLOAD & COPY
// ═══════════════════════════════════════
function downloadCard(canvas, petName, format) {
  const link = document.createElement('a');
  link.download = `patitasba_${petName.toLowerCase().replace(/\s/g, '_')}_${format}.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
}

function copyCaption(btn, text) {
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✅ Copiado!';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = '📋 Copiar caption';
      btn.classList.remove('copied');
    }, 2000);
  });
}

// ═══════════════════════════════════════
//  RENDER UI
// ═══════════════════════════════════════
async function renderCards(pets, format) {
  const container = document.getElementById('cards-container');
  container.innerHTML = '';

  const available = pets.filter(p => p.disponible);
  const dailyPick = getDailyPick(pets);

  // Sort: daily pick first, then by score
  const sorted = [...available].sort((a, b) => {
    if (dailyPick && a.id === dailyPick.id) return -1;
    if (dailyPick && b.id === dailyPick.id) return 1;
    return scorePet(b) - scorePet(a);
  });

  for (const pet of sorted) {
    const card = document.createElement('div');
    card.className = 'pet-card' + (dailyPick && pet.id === dailyPick.id ? ' suggested' : '');

    const caption = generateCaption(pet, format);

    card.innerHTML = `
      <div class="preview"><canvas id="canvas-${pet.id}"></canvas></div>
      <div class="card-body">
        <h3>${pet.emoji} ${pet.nombre} ${dailyPick && pet.id === dailyPick.id ? '<span style="color:#D4827E;font-size:0.75rem;">⭐ SUGERIDO HOY</span>' : ''}</h3>
        <div class="meta">
          <span>📅 ${pet.edad}</span>
          <span>📏 ${pet.tamanio}</span>
          <span>🏥 @${pet.ig}</span>
        </div>
        <div class="caption-box">${caption.replace(/\n/g, '<br>')}</div>
        <div class="card-actions">
          <button class="btn-download" onclick="downloadCard(document.getElementById('canvas-${pet.id}'), '${pet.nombre}', '${format}')">⬇️ Descargar card</button>
          <button class="btn-copy" onclick="copyCaption(this, \`${caption.replace(/`/g, '\\`').replace(/\\/g, '\\\\')}\`)">📋 Copiar caption</button>
        </div>
      </div>
    `;

    container.appendChild(card);

    // Generate canvas async
    const canvas = card.querySelector('canvas');
    try {
      if (format === 'story') {
        await generateStoryCard(canvas, pet);
      } else if (format === 'nadie-me-quiere') {
        await generateNadieMeQuiereCard(canvas, pet);
      } else {
        await generateFeedCard(canvas, pet);
      }
    } catch (e) {
      console.error('Error rendering card for', pet.nombre, e);
    }
  }
}

function renderDailyPick(pets) {
  const pick = getDailyPick(pets);
  if (!pick) return;
  const dias = Math.max(1, Math.floor((Date.now() - new Date(pick.fecha).getTime()) / 86400000));
  const container = document.getElementById('daily-pick-container');
  container.innerHTML = `
    <div class="daily-pick">
      <div class="badge">⭐ SUGERENCIA DEL DÍA</div>
      <div class="info">
        <h3>${pick.emoji} ${pick.nombre} — ${pick.edad}, ${pick.tamanio}</h3>
        <p>${dias} días esperando hogar · ${pick.org} · ${pick.edadCat === 'adulto' || pick.edadCat === 'adulto+' ? 'Los adultos necesitan más visibilidad 💛' : pick.raza === 'Mestizo/a' || pick.raza === 'Doméstico/a' ? 'Los mestizos suelen esperar más tiempo 💛' : 'Su historia merece ser contada 💛'}</p>
      </div>
      <button class="action-btn" onclick="document.querySelector('.pet-card.suggested .btn-download')?.click()">⬇️ Descargar</button>
    </div>
  `;
}

function renderStats(pets) {
  const available = pets.filter(p => p.disponible);
  const perros = available.filter(p => p.tipo === 'perro').length;
  const gatos = available.filter(p => p.tipo === 'gato').length;
  const refugios = [...new Set(available.map(p => p.ig))].length;
  const avgDias = available.length ? Math.round(available.reduce((sum, p) => sum + Math.floor((Date.now() - new Date(p.fecha).getTime()) / 86400000), 0) / available.length) : 0;

  document.getElementById('stats-container').innerHTML = `
    <div class="stat-card"><div class="num">${available.length}</div><div class="label">En adopción</div></div>
    <div class="stat-card"><div class="num">${perros}</div><div class="label">Perros</div></div>
    <div class="stat-card"><div class="num">${gatos}</div><div class="label">Gatos</div></div>
    <div class="stat-card"><div class="num">${refugios}</div><div class="label">Refugios</div></div>
    <div class="stat-card"><div class="num">${avgDias}d</div><div class="label">Promedio de espera</div></div>
  `;
}

// ═══════════════════════════════════════
//  FORMAT TABS
// ═══════════════════════════════════════
document.getElementById('format-tabs').addEventListener('click', (e) => {
  const btn = e.target.closest('.format-tab');
  if (!btn) return;
  document.querySelectorAll('.format-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentFormat = btn.dataset.format;
  renderCards(allPets, currentFormat);
});

// ═══════════════════════════════════════
//  INIT
// ═══════════════════════════════════════
async function init() {
  try {
    const res = await fetch(PETS_JSON_URL);
    const data = await res.json();
    allPets = data.mascotas || [];

    renderStats(allPets);
    renderDailyPick(allPets);
    renderCards(allPets, currentFormat);
  } catch (err) {
    document.getElementById('cards-container').innerHTML = `
      <div class="loading">
        <p style="color:#D4827E;">❌ Error cargando pets.json</p>
        <p style="font-size:0.8rem;color:#666;margin-top:8px;">Asegurate de que este archivo esté en la misma carpeta que pets.json</p>
        <p style="font-size:0.75rem;color:#444;margin-top:8px;">${err.message}</p>
      </div>
    `;
  }
}

init();
</script>
